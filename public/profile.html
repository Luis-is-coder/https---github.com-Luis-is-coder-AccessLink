<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – AccessLink</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/index.html">Access<span>Link</span></a>
      <a href="/index.html" class="btn btn-sm btn-outline-light">Back to map</a>
    </div>
  </nav>

  <main class="page-content container" style="max-width:600px">
    <h1 class="h3 mb-4">Your profile</h1>
    <form id="profile-form" class="card shadow-sm">
      <div class="card-body p-4">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" id="name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" disabled>
        </div>
        <div class="mb-3">
          <label for="phone" class="form-label">Phone</label>
          <input type="tel" id="phone" class="form-control">
        </div>
        <div class="mb-3">
          <label for="emergency_contact" class="form-label">Emergency contact email</label>
          <input type="email" id="emergency_contact" class="form-control" placeholder="friend@email.com">
        </div>
        <fieldset class="mb-3">
          <legend class="form-label fs-6">Accessibility preferences (for itinerary planning)</legend>
          <div class="form-check"><input class="form-check-input" type="checkbox" id="pref-mobility"><label class="form-check-label" for="pref-mobility">Mobility – ramps, elevators</label></div>
          <div class="form-check"><input class="form-check-input" type="checkbox" id="pref-vision"><label class="form-check-label" for="pref-vision">Vision – braille, signage</label></div>
          <div class="form-check"><input class="form-check-input" type="checkbox" id="pref-hearing"><label class="form-check-label" for="pref-hearing">Hearing – quiet rooms, sign language</label></div>
        </fieldset>
        <button type="submit" class="btn btn-primary">Save profile</button>
      </div>
    </form>
  </main>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
