<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – AccessLink</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/index.html">Access<span>Link</span></a>
    </div>
  </nav>

  <main class="page-content container">
    <div class="auth-card card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-4">Create account</h1>
        <form id="register-form">
          <div class="mb-3">
            <label for="name" class="form-label">Full name</label>
            <input type="text" id="name" class="form-control" required autocomplete="name">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" required autocomplete="email">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password (min 6 chars)</label>
            <input type="password" id="password" class="form-control" required minlength="6" autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Phone (optional)</label>
            <input type="tel" id="phone" class="form-control" autocomplete="tel">
          </div>
          <div class="mb-3">
            <label for="role" class="form-label">Account type</label>
            <select id="role" class="form-select">
              <option value="user">Community member</option>
              <option value="volunteer">Volunteer (help others)</option>
              <option value="venue_owner">Venue / business owner</option>
            </select>
          </div>
          <fieldset class="mb-3">
            <legend class="form-label fs-6">My accessibility preferences</legend>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="pref-mobility"><label class="form-check-label" for="pref-mobility">Mobility</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="pref-vision"><label class="form-check-label" for="pref-vision">Vision</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" id="pref-hearing"><label class="form-check-label" for="pref-hearing">Hearing</label></div>
          </fieldset>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <p class="mt-3 mb-0 text-center"><a href="/login.html">Already have an account?</a></p>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
